<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmora AI Workflow Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'DM Sans', 'Noto Sans JP', sans-serif; }
    .chip-btn { transition: all 0.15s ease; }
    .chip-btn:hover { transform: translateY(-1px); }
    .spin { animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    .key-input:focus { outline: none; box-shadow: 0 0 0 2px rgba(249,115,22,0.3); }
  </style>
</head>
<body class="bg-slate-50">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const PLATFORMS = ["X", "TikTok", "Instagram Reels", "YouTube Shorts"];

const SAMPLE_IDEAS = [
  // ビジネス・副業
  "月5万円の副業を3ヶ月で達成した具体的な手順",
  "フリーランス1年目が絶対やるべき案件獲得法3選",
  "ChatGPTで作業時間を半分にする仕事術5選",
  "会社員でもできる節税テクニック入門｜年間10万円削減",
  "Notion×AI で仕事の生産性を3倍にする方法",
  // ライフスタイル
  "一人暮らし社会人の週末ルーティン｜充実感の作り方",
  "ミニマリストが手放してよかったモノ15選",
  "朝5時起きを30日続けてわかった3つのこと",
  "年収300万でも豊かに暮らす家計管理術",
  "ダ・ナン在住者が語るアジア移住のリアルな費用",
  // ガジェット・テック
  "2025年買ってよかったガジェットランキングTOP5",
  "MacBook×iPad 最強デュアル環境の組み方",
  "Wi-Fiルーターの正しい選び方｜速度が3倍変わる",
  "Kindle Unlimitedで読むべき本10選｜ジャンル別",
  "スマホ1台でできるYouTube動画編集フル解説",
  // 自己啓発・学習
  "読書の内容を90%忘れない「アウトプット読書法」",
  "英語力ゼロから半年でTOEIC700点とった勉強法",
  "頭がいい人のメモ術｜記憶定着率が変わる書き方",
  "先延ばし癖を治す「5秒ルール」と科学的根拠",
  "成功者が共通してやっている朝のルーティン3つ",
  // エンタメ・カルチャー
  "2025年上半期Netflixで見るべきドラマ5選",
  "韓国ドラマの沼にハマる人が続出する理由を分析",
  "カフェ巡りがもっと楽しくなるレビューの書き方",
  "一眼カメラ初心者が最初に覚えるべき3つの設定",
  "料理が苦手な人でも映えるプレートの盛り付け術",
  // 健康・フィットネス
  "デスクワーカーの肩こりを10分で解消するストレッチ",
  "糖質制限なしで3ヶ月−5kgを達成した食事ルール",
  "睡眠の質が上がった習慣5選｜睡眠専門家監修",
  "ジム不要｜自重トレーニングで体を変える6週間プログラム",
  "腸活で人生が変わった話｜食事×生活習慣の改善法",
];

const CATEGORIES = [
  { label: "💼 ビジネス・副業",    range: [0, 5]  },
  { label: "🏠 ライフスタイル",    range: [5, 10] },
  { label: "📱 ガジェット・テック", range: [10, 15] },
  { label: "📚 自己啓発・学習",    range: [15, 20] },
  { label: "🎬 エンタメ・カルチャー", range: [20, 25] },
  { label: "💪 健康・フィットネス",  range: [25, 30] },
];

const EMPTY = {
  sns:     "## SNS台本構成案\n\n左のアイデアサンプルをクリックするか、自由入力して「生成実行」を押してください。",
  prompts: "## AI Video Prompts\n\nSNS Director と同時生成されます。まず左パネルで入力してください。",
  sop:     "## Filmora SOP\n\nSNS Director と同時生成されます。まず左パネルで入力してください。",
};

// ---- Markdown renderer (純粋JS) ----
function renderMd(md) {
  if (!md) return null;
  return md.split("\n").map((line, i) => {
    if (line.startsWith("## "))
      return React.createElement("h2", { key: i, className: "text-lg font-bold mt-5 mb-2 text-orange-600" }, line.slice(3));
    if (line.startsWith("### "))
      return React.createElement("h3", { key: i, className: "text-base font-semibold mt-4 mb-1 text-slate-700" }, line.slice(4));
    if (/^\*\*(.+)\*\*$/.test(line))
      return React.createElement("p", { key: i, className: "font-semibold mt-3 text-slate-800" }, line.replace(/\*\*/g, ""));
    if (line.startsWith("- "))
      return React.createElement("li", { key: i, className: "ml-5 text-slate-600 leading-relaxed list-disc" }, line.slice(2));
    if (line.trim() === "")
      return React.createElement("div", { key: i, className: "h-2" });
    return React.createElement("p", { key: i, className: "text-slate-600 leading-relaxed text-sm" }, line);
  });
}

// ---- API key storage ----
const LS_KEY = "filmora_gemini_api_key";

function App() {
  const [apiKey, setApiKey]       = useState(() => localStorage.getItem(LS_KEY) || "");
  const [showKey, setShowKey]     = useState(false);
  const [keySaved, setKeySaved]   = useState(false);
  const [idea, setIdea]           = useState("");
  const [platforms, setPlatforms] = useState(["X"]);
  const [tab, setTab]             = useState(0);
  const [outputs, setOutputs]     = useState(null);
  const [generating, setGenerating] = useState(false);
  const [error, setError]         = useState("");

  const saveKey = () => {
    localStorage.setItem(LS_KEY, apiKey.trim());
    setKeySaved(true);
    setTimeout(() => setKeySaved(false), 2000);
  };

  const toggle = (p) =>
    setPlatforms(prev => prev.includes(p) ? prev.filter(x => x !== p) : [...prev, p]);

  const generate = async () => {
    if (!idea.trim()) return;
    const key = apiKey.trim();
    if (!key) { setError("APIキーを入力してください。"); return; }
    setError("");
    setGenerating(true);
    setOutputs(null);

    const sys = `あなたは3つの役割を同時に担うAIです。入力されたアイデアメモとターゲット媒体から、以下3セクションをJSON形式で出力してください。キーは sns, prompts, sop です。各値はMarkdown文字列です。

【sns】エンゲージメント特化のSNS台本。結論→要点3つ→構成の順。Xなら180-200文字/投稿でスレッド展開、CTA最後。断定調、曖昧表現禁止。入力アイデアの内容から適切なターゲット層・トーンを自動判断すること。

【prompts】各シーン用の英語AI動画プロンプト。構造: Subject / Action / Environment / Camera Movement / Light Source / Shot Type / Atmosphere。末尾に必ず "masterpiece, ultra detailed, cinematic lighting, physically accurate lighting, high contrast, commercial advertising quality, 8k resolution style" を付与。3〜5シーン生成。

【sop】Filmora 15編集SOP。項目: 1)プロジェクト設定(アスペクト比/FPS) 2)Safe Zone 3)Auto Reframe 4)AI字幕(STT) 5)BGM/音量(-16〜-14 LUFS) 6)書き出し(MP4/H.264,1080x1920) 7)命名規則({date}_{platform}_{campaign}_{angleID}_{v}) 8)トラブルシュート(プロキシ/背景レンダ)。選択媒体別の上限も明記。

JSONのみ出力。バッククォートや説明文は不要。`;

    const userMsg = `アイデアメモ: ${idea}\nターゲット媒体: ${platforms.join(", ")}`;

    try {
      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
      const res = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          systemInstruction: { parts: [{ text: sys }] },
          contents: [{ role: "user", parts: [{ text: userMsg }] }],
          generationConfig: { responseMimeType: "application/json" },
        }),
      });

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(`APIエラー ${res.status}: ${errData?.error?.message || res.statusText}`);
      }

      const data = await res.json();
      const text = data.candidates[0].content.parts[0].text;
      let parsed;
      try {
        parsed = JSON.parse(text);
      } catch {
        const match = text.match(/\{[\s\S]+\}/);
        if (match) parsed = JSON.parse(match[0]);
        else throw new Error("レスポンスのJSONパースに失敗しました。もう一度お試しください。");
      }
      setOutputs(parsed);
      setTab(0);
    } catch (e) {
      const msg = e.message || "不明なエラー";
      setOutputs({
        sns:     `## エラー\n\n⚠ 生成に失敗しました。\n\n**詳細:** ${msg}\n\n**よくある原因:**\n- APIキーが正しくない（Google AI StudioのAPIキーを確認）\n- インターネット接続を確認\n- しばらく待ってから再試行`,
        prompts: `## エラー\n\nSNS Directorタブのエラー内容を確認してください。`,
        sop:     `## エラー\n\nSNS Directorタブのエラー内容を確認してください。`,
      });
    }
    setGenerating(false);
  };

  const TABS = [
    { label: "SNS Director",    icon: "📝", key: "sns" },
    { label: "AI Video Prompts", icon: "🎬", key: "prompts" },
    { label: "Filmora SOP",     icon: "🎛️", key: "sop" },
  ];

  const content = outputs ? outputs[TABS[tab].key] : EMPTY[TABS[tab].key];

  return React.createElement("div", { className: "min-h-screen bg-slate-50 text-slate-800" },

    // ── Header ──
    React.createElement("header", { className: "bg-white border-b border-slate-200 px-6 py-3 flex items-center gap-3 sticky top-0 z-20 shadow-sm" },
      React.createElement("div", { className: "w-9 h-9 rounded-xl bg-gradient-to-br from-orange-500 to-amber-500 flex items-center justify-center text-white font-bold text-lg shadow-sm" }, "F"),
      React.createElement("div", null,
        React.createElement("h1", { className: "text-base font-bold tracking-tight text-slate-900" }, "Filmora AI Workflow Studio"),
        React.createElement("p",  { className: "text-xs text-slate-400" }, "アイデア → 台本 → プロンプト → SOP を一気通貫生成")
      )
    ),

    // ── Body ──
    React.createElement("div", { className: "flex flex-col lg:flex-row" },

      // ── Sidebar ──
      React.createElement("aside", {
        className: "lg:w-[340px] w-full border-b lg:border-b-0 lg:border-r border-slate-200 bg-white p-5 flex-shrink-0 lg:max-h-[calc(100vh-57px)] lg:overflow-y-auto"
      },

        // APIキー入力
        React.createElement("div", { className: "mb-4 p-3 bg-amber-50 border border-amber-200 rounded-xl" },
          React.createElement("label", { className: "text-xs font-semibold text-amber-800 block mb-1.5" }, "🔑 Gemini APIキー"),
          React.createElement("div", { className: "flex gap-1.5" },
            React.createElement("input", {
              type: showKey ? "text" : "password",
              className: "key-input flex-1 min-w-0 border border-amber-300 rounded-lg px-2.5 py-1.5 text-xs text-slate-700 bg-white placeholder-slate-400",
              placeholder: "AIza...",
              value: apiKey,
              onChange: e => setApiKey(e.target.value),
            }),
            React.createElement("button", {
              onClick: () => setShowKey(v => !v),
              className: "px-2 py-1.5 text-xs border border-amber-300 rounded-lg text-amber-700 bg-white hover:bg-amber-100 flex-shrink-0",
            }, showKey ? "隠す" : "表示"),
            React.createElement("button", {
              onClick: saveKey,
              className: "px-2 py-1.5 text-xs rounded-lg font-semibold flex-shrink-0 " + (keySaved ? "bg-green-500 text-white" : "bg-amber-500 text-white hover:bg-amber-600"),
            }, keySaved ? "✓" : "保存"),
          ),
          React.createElement("p", { className: "text-xs text-amber-600 mt-1.5" },
            "キーは",
            React.createElement("a", { href: "https://aistudio.google.com/app/apikey", target: "_blank", className: "underline font-medium" }, "Google AI Studio"),
            "で取得。ブラウザにのみ保存されます。"
          ),
          error ? React.createElement("p", { className: "text-xs text-red-600 mt-1.5 font-medium" }, "⚠ " + error) : null,
        ),

        // アイデアメモ
        React.createElement("label", { className: "text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1.5" }, "アイデアメモ"),
        React.createElement("textarea", {
          className: "w-full h-24 bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-orange-400/40 focus:border-orange-400 resize-none",
          placeholder: "下のサンプルをクリック、または自由に入力...",
          value: idea,
          onChange: e => setIdea(e.target.value),
        }),

        // ターゲット媒体
        React.createElement("label", { className: "text-xs font-semibold text-slate-500 uppercase tracking-wider block mt-4 mb-2" }, "ターゲット媒体"),
        React.createElement("div", { className: "flex flex-wrap gap-2" },
          PLATFORMS.map(p =>
            React.createElement("button", {
              key: p,
              onClick: () => toggle(p),
              className: "chip-btn px-3 py-1.5 rounded-full text-xs font-semibold border " + (
                platforms.includes(p)
                  ? "bg-orange-500 border-orange-500 text-white shadow-sm"
                  : "bg-white border-slate-300 text-slate-500 hover:border-slate-400"
              ),
            }, p)
          )
        ),

        // 生成ボタン
        React.createElement("button", {
          onClick: generate,
          disabled: generating || !idea.trim() || !apiKey.trim(),
          className: "w-full mt-4 py-2.5 rounded-lg bg-gradient-to-r from-orange-500 to-amber-500 text-sm font-bold text-white hover:opacity-90 transition shadow-sm disabled:opacity-40 disabled:cursor-not-allowed",
        },
          generating
            ? React.createElement("span", { className: "flex items-center justify-center gap-2" },
                React.createElement("span", { className: "spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full" }),
                "生成中..."
              )
            : "生成実行 →"
        ),

        // サンプルアイデア
        React.createElement("div", { className: "mt-5 pt-4 border-t border-slate-100" },
          React.createElement("p", { className: "text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3" }, "💡 アイデアサンプル"),
          CATEGORIES.map(cat =>
            React.createElement("div", { key: cat.label, className: "mb-4" },
              React.createElement("p", { className: "text-xs font-bold text-slate-500 mb-1.5" }, cat.label),
              React.createElement("div", { className: "flex flex-col gap-1" },
                SAMPLE_IDEAS.slice(cat.range[0], cat.range[1]).map((s, i) =>
                  React.createElement("button", {
                    key: i,
                    onClick: () => setIdea(s),
                    className: "chip-btn text-left px-3 py-2 rounded-lg text-xs leading-snug border w-full " + (
                      idea === s
                        ? "bg-orange-50 border-orange-300 text-orange-700 font-medium"
                        : "bg-slate-50 border-slate-200 text-slate-600 hover:bg-white hover:border-slate-300"
                    ),
                  }, s)
                )
              )
            )
          )
        )
      ),

      // ── Main ──
      React.createElement("main", { className: "flex-1 p-5 lg:p-6" },

        // Tabs
        React.createElement("div", { className: "flex gap-1 mb-4 bg-slate-100 rounded-xl p-1 w-fit" },
          TABS.map((t, i) =>
            React.createElement("button", {
              key: i,
              onClick: () => setTab(i),
              className: "px-4 py-2 rounded-lg text-sm font-semibold transition-all " + (
                tab === i ? "bg-white text-orange-600 shadow-sm" : "text-slate-500 hover:text-slate-700"
              ),
            }, t.icon + " " + t.label)
          )
        ),

        // Output
        React.createElement("div", {
          className: "bg-white border border-slate-200 rounded-2xl p-6 min-h-[60vh] overflow-auto shadow-sm"
        },
          generating
            ? React.createElement("div", { className: "flex flex-col items-center justify-center h-64 text-slate-400" },
                React.createElement("div", { className: "spin w-8 h-8 border-2 border-orange-400 border-t-transparent rounded-full mb-3" }),
                React.createElement("p", { className: "text-sm font-medium" }, "AI が台本・プロンプト・SOPを同時生成中..."),
                React.createElement("p", { className: "text-xs mt-1 text-slate-300" }, "通常15〜30秒かかります")
              )
            : React.createElement("div", null, renderMd(content))
        )
      )
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
